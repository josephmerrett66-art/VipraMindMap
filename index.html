<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIPRA — Mind Map</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#06080D;--surface:#0C0F18;--surface2:#111520;
  --border:#1A2030;--border2:#243040;
  --accent:#C8F04E;--accent2:#8ABF2E;
  --text:#ECF0FF;--muted:#5A6A80;--muted2:#2E3A4A;
  --danger:#FF4F5E;--info:#3D9EFF;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);cursor:none;user-select:none;}
#cursor{position:fixed;width:8px;height:8px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .15s,height .15s,transform .08s;mix-blend-mode:difference;}
#cursor-ring{position:fixed;width:28px;height:28px;border:1.5px solid rgba(200,240,78,0.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);}
#cursor.grab{transform:translate(-50%,-50%) scale(0.5);}
#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
#canvas-wrap{position:fixed;inset:0;overflow:hidden;z-index:1;}
#canvas{position:absolute;transform-origin:0 0;will-change:transform;}
#lines-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}

.node{position:absolute;transform:translate(-50%,-50%);}

.root-node{
  width:148px;height:148px;border-radius:50%;
  background:rgba(200,240,78,0.05);border:1.5px solid rgba(200,240,78,0.25);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;position:relative;cursor:pointer;
  transition:background .2s,border-color .2s;
}
.root-node:hover{background:rgba(200,240,78,0.09);border-color:rgba(200,240,78,0.5);}
.root-node::before{content:'';position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(200,240,78,0.07);animation:rp 3s ease-in-out infinite;}
.root-node::after{content:'';position:absolute;inset:-20px;border-radius:50%;border:1px solid rgba(200,240,78,0.04);animation:rp 3s ease-in-out infinite .6s;}
@keyframes rp{0%,100%{opacity:1;}50%{opacity:0.3;transform:scale(1.03);}}
.root-label{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:.14em;color:var(--accent);line-height:1;}
.root-sub{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-top:4px;}
.root-add{font-family:'DM Mono',monospace;font-size:9px;color:rgba(200,240,78,0.4);margin-top:6px;letter-spacing:.1em;}

.branch-wrap{position:relative;}
.branch-node{
  min-width:115px;max-width:155px;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:11px;padding:10px 13px;text-align:center;
  transition:background .18s,border-color .18s,transform .18s;
  transform-origin:center;will-change:transform;
}
.branch-node:hover{background:var(--surface2);transform:scale(1.05);}
.depth-1 .branch-node{border-color:rgba(200,240,78,0.22);}
.depth-1 .branch-node:hover{border-color:rgba(200,240,78,0.55);}
.depth-2 .branch-node{border-color:rgba(61,158,255,0.18);}
.depth-2 .branch-node:hover{border-color:rgba(61,158,255,0.5);}
.depth-3 .branch-node{border-color:rgba(180,100,255,0.18);}
.depth-3 .branch-node:hover{border-color:rgba(180,100,255,0.5);}
.depth-4 .branch-node{border-color:rgba(255,185,48,0.18);}
.depth-4 .branch-node:hover{border-color:rgba(255,185,48,0.5);}
.depth-5 .branch-node, .depth-6 .branch-node{border-color:rgba(61,255,180,0.15);}

.b-type{display:inline-block;padding:2px 7px;border-radius:3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.t-idea{background:rgba(255,185,48,.12);color:#ffb930;}
.t-note{background:rgba(61,158,255,.1);color:var(--info);}
.t-image{background:rgba(200,240,78,.1);color:var(--accent2);}
.t-link{background:rgba(255,79,94,.1);color:var(--danger);}
.t-research{background:rgba(180,100,255,.1);color:#b464ff;}
.t-task{background:rgba(61,255,180,.1);color:#3dffa0;}

.b-img{width:100%;height:65px;object-fit:cover;border-radius:5px;margin-bottom:6px;display:block;}
.b-label{font-size:11px;font-weight:500;color:var(--text);line-height:1.4;}
.b-body{font-size:10px;font-weight:300;color:var(--muted);margin-top:3px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.b-kids{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);margin-top:4px;}

.node-actions{
  display:none;align-items:center;justify-content:center;gap:3px;
  padding:6px 4px 2px;
  border-top:1px solid var(--border);
  margin-top:6px;
}
.branch-node:hover .node-actions{display:flex;}
.branch-wrap{}
.na{background:none;border:none;font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.06em;color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:10px;transition:all .15s;}
.na:hover{background:rgba(200,240,78,.1);color:var(--accent);}
.na.del:hover{background:rgba(255,79,94,.1);color:var(--danger);}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;padding:0 22px;background:rgba(6,8,13,.94);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);z-index:100;gap:14px;}
.hud-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.14em;color:var(--accent);}
.hud-sub{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;}
.hud-sep{width:1px;height:18px;background:var(--border2);}
.hud-hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:.04em;}
.hud-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.hud-btn{display:flex;align-items:center;gap:5px;padding:6px 13px;background:transparent;border:1px solid var(--border2);border-radius:6px;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .15s;}
.hud-btn:hover{border-color:var(--accent);color:var(--accent);}
.zoom-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);min-width:38px;text-align:center;}
.sdot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:sdp 2s infinite;}
@keyframes sdp{0%,100%{box-shadow:0 0 0 0 rgba(200,240,78,.5);}50%{box-shadow:0 0 0 5px rgba(200,240,78,0);}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:460px;max-width:92vw;padding:28px;transform:translateY(14px) scale(.97);transition:transform .2s;max-height:88vh;overflow-y:auto;scrollbar-width:thin;}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.08em;color:var(--text);margin-bottom:4px;}
.modal-ctx{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent2);letter-spacing:.14em;text-transform:uppercase;margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.field input,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:10px 13px;font-size:13px;font-weight:300;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;}
.field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,240,78,.05);}
.field input::placeholder,.field textarea::placeholder{color:var(--muted2);}
.field textarea{min-height:80px;resize:vertical;line-height:1.6;}
.type-pills{display:flex;gap:6px;flex-wrap:wrap;}
.tp{padding:5px 13px;border:1px solid var(--border2);border-radius:20px;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.08em;color:var(--muted);cursor:pointer;background:transparent;transition:all .15s;}
.tp:hover{border-color:var(--muted);color:var(--text);}
.tp.active{background:rgba(200,240,78,.08);border-color:var(--accent);color:var(--accent);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.btn-c{padding:9px 18px;background:transparent;border:1px solid var(--border2);border-radius:7px;font-size:13px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-c:hover{color:var(--text);border-color:var(--border);}
.btn-s{padding:9px 22px;background:var(--accent);border:none;border-radius:7px;font-size:13px;font-weight:500;color:var(--bg);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-s:hover{background:#d8ff5a;}

.toast{position:fixed;bottom:22px;right:22px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--text);z-index:300;transform:translateY(8px);opacity:0;transition:all .2s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(200,240,78,.3);color:var(--accent);}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<div id="hud">
  <div><div class="hud-logo">VIPRA</div><div class="hud-sub">Mind Map</div></div>
  <div class="hud-sep"></div>
  <div class="hud-hint">Drag to pan &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Hover any node → + child / edit / del</div>
  <div class="hud-right">
    <div class="sdot"></div>
    <div class="zoom-val" id="zoomVal">100%</div>
    <button class="hud-btn" onclick="resetView()">Reset</button>
    <button class="hud-btn" onclick="exportData()">↓ Export</button>
  </div>
</div>

<div id="canvas-wrap">
  <div id="canvas">
    <svg id="lines-svg"></svg>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">ADD NODE</div>
    <div class="modal-ctx" id="modalCtx">Child of: VIPRA</div>
    <div class="field">
      <label>Type</label>
      <div class="type-pills" id="typePills">
        <button class="tp active" onclick="setType('idea',this)">Idea</button>
        <button class="tp" onclick="setType('note',this)">Note</button>
        <button class="tp" onclick="setType('image',this)">Image</button>
        <button class="tp" onclick="setType('link',this)">Link</button>
        <button class="tp" onclick="setType('research',this)">Research</button>
        <button class="tp" onclick="setType('task',this)">Task</button>
      </div>
    </div>
    <div class="field">
      <label>Label</label>
      <input id="mLabel" placeholder="Node label..."/>
    </div>
    <div class="field">
      <label id="mBodyLbl">Notes</label>
      <textarea id="mBody" placeholder="Details..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-c" onclick="closeModal()">Cancel</button>
      <button class="btn-s" onclick="saveNode()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK='vipra_map_v3';
let tree=null, selectedParentId=null, editingId=null, activeType='idea';

function makeId(){return '_'+Math.random().toString(36).slice(2,9);}

function makeNode(label,type,x,y){
  return{id:makeId(),label,type,body:'',children:[],x:x||0,y:y||0};
}

function d2r(d){return d*Math.PI/180;}

function defaultTree(){
  const angles=[-90,-30,30,90,150,210];
  const labels=['Product Design','Marketing','Research','Finance','Prototype','Ideas'];
  const types=['idea','note','research','note','task','idea'];
  return{
    id:'root',label:'VIPRA',type:'root',body:'',children:
    labels.map((l,i)=>makeNode(l,types[i],Math.cos(d2r(angles[i]))*270,Math.sin(d2r(angles[i]))*270))
  };
}

function loadData(){
  try{const r=localStorage.getItem(SK);tree=r?JSON.parse(r):defaultTree();}
  catch{tree=defaultTree();}
}
function saveData(){try{localStorage.setItem(SK,JSON.stringify(tree));}catch(e){}}

function findNode(id,n){
  if(!n)n=tree;
  if(n.id===id)return n;
  for(const c of n.children||[]){const r=findNode(id,c);if(r)return r;}
  return null;
}

function findParent(id,n){
  if(!n)n=tree;
  for(const c of n.children||[]){
    if(c.id===id)return n;
    const r=findParent(id,c);if(r)return r;
  }
  return null;
}

function deleteNode(id,n){
  if(!n)n=tree;
  const idx=n.children.findIndex(c=>c.id===id);
  if(idx!==-1){n.children.splice(idx,1);return true;}
  for(const c of n.children){if(deleteNode(id,c))return true;}
  return false;
}

// ── VIEWPORT ──────────────────────────────────────────────────
let vx=0,vy=0,vs=1,panning=false,lmx=0,lmy=0,cmx=0,cmy=0,trx=0,trY=0;
const wrap=document.getElementById('canvas-wrap');
const cvs=document.getElementById('canvas');
const svg=document.getElementById('lines-svg');
const cursor=document.getElementById('cursor');
const ring=document.getElementById('cursor-ring');

document.addEventListener('mousemove',e=>{cmx=e.clientX;cmy=e.clientY;cursor.style.left=cmx+'px';cursor.style.top=cmy+'px';});
(function anim(){trx+=(cmx-trx)*.1;trY+=(cmy-trY)*.1;ring.style.left=trx+'px';ring.style.top=trY+'px';requestAnimationFrame(anim);})();
document.addEventListener('mousedown',()=>cursor.classList.add('grab'));
document.addEventListener('mouseup',()=>cursor.classList.remove('grab'));

wrap.addEventListener('mousedown',e=>{
  const t=e.target;
  if(t===wrap||t===cvs||t.tagName==='svg'||t.tagName==='line'||t.tagName==='path'){
    panning=true;lmx=e.clientX;lmy=e.clientY;
  }
});
window.addEventListener('mousemove',e=>{if(!panning)return;vx+=e.clientX-lmx;vy+=e.clientY-lmy;lmx=e.clientX;lmy=e.clientY;applyT();});
window.addEventListener('mouseup',()=>panning=false);
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const zf=e.deltaY<0?1.08:.93;
  const r=wrap.getBoundingClientRect(),wx=e.clientX-r.left,wy=e.clientY-r.top;
  vx=(vx-wx)*zf+wx;vy=(vy-wy)*zf+wy;
  vs=Math.min(Math.max(vs*zf,.08),4);applyT();
},{passive:false});

function applyT(){
  cvs.style.transform=`translate(${vx}px,${vy}px) scale(${vs})`;
  document.getElementById('zoomVal').textContent=Math.round(vs*100)+'%';
}
function resetView(){vx=window.innerWidth/2;vy=(window.innerHeight+52)/2;vs=1;applyT();}

// ── BG PARTICLES ──────────────────────────────────────────────
const bc=document.getElementById('bg-canvas'),bx=bc.getContext('2d');
function rsz(){bc.width=window.innerWidth;bc.height=window.innerHeight;}rsz();window.addEventListener('resize',rsz);
const pts=Array.from({length:55},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,r:Math.random()*1.2+.3,a:Math.random()*.2+.05}));
(function db(){
  bx.clearRect(0,0,bc.width,bc.height);
  pts.forEach(p=>{p.x+=p.vx+(cmx-bc.width/2)*.00004;p.y+=p.vy+(cmy-bc.height/2)*.00004;if(p.x<0)p.x=bc.width;if(p.x>bc.width)p.x=0;if(p.y<0)p.y=bc.height;if(p.y>bc.height)p.y=0;bx.beginPath();bx.arc(p.x,p.y,p.r,0,Math.PI*2);bx.fillStyle=`rgba(200,240,78,${p.a})`;bx.fill();});
  for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<95){bx.beginPath();bx.moveTo(pts[i].x,pts[i].y);bx.lineTo(pts[j].x,pts[j].y);bx.strokeStyle=`rgba(200,240,78,${.04*(1-d/95)})`;bx.lineWidth=.5;bx.stroke();}}
  requestAnimationFrame(db);
})();

// ── DEPTH COLORS ──────────────────────────────────────────────
const DC=['rgba(200,240,78,','rgba(61,158,255,','rgba(180,100,255,','rgba(255,185,48,','rgba(61,255,180,','rgba(255,79,94,'];
function dc(d){return DC[Math.min(d,DC.length-1)];}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  cvs.querySelectorAll('.node').forEach(n=>n.remove());
  svg.innerHTML='';
  renderNode(tree,null,0);
}

function renderNode(node,parent,depth){
  const el=document.createElement('div');
  el.className='node';
  el.style.left=node.x+'px';
  el.style.top=node.y+'px';
  el.dataset.id=node.id;

  if(node.type==='root'){
    el.innerHTML=`<div class="root-node">
      <div class="root-label">VIPRA</div>
      <div class="root-sub">Mind Map</div>
      <div class="root-add">click to add</div>
    </div>`;
    el.querySelector('.root-node').addEventListener('click',e=>{e.stopPropagation();openModal(node);});
  } else {
    const d=Math.min(depth,5);
    const isImg=node.type==='image'&&node.body&&(node.body.startsWith('http')||node.body.startsWith('/'));
    el.innerHTML=`<div class="branch-wrap">
      <div class="branch-node depth-${d}">
        ${isImg?`<img class="b-img" src="${eh(node.body)}" alt="" onerror="this.style.display='none'"/>` :''}
        <div class="b-type t-${node.type}">${node.type}</div>
        <div class="b-label">${eh(node.label)}</div>
        ${node.body&&node.type!=='image'?`<div class="b-body">${eh(node.body.slice(0,80))}${node.body.length>80?'…':''}</div>`:''}
        <div class="b-kids">${node.children.length} child${node.children.length!==1?'ren':''}</div>
        <div class="node-actions">
          <button class="na" onclick="openModalById('${node.id}',event)">+ child</button>
          <button class="na" onclick="openEditById('${node.id}',event)">edit</button>
          <button class="na del" onclick="doDelete('${node.id}',event)">del</button>
        </div>
      </div>
    </div>`;
  }

  cvs.appendChild(el);

  // Draw lines to children + recurse
  (node.children||[]).forEach(child=>{
    drawCurve(node.x,node.y,child.x,child.y,dc(depth)+'0.22)',depth===0?1.5:1);
    renderNode(child,node,depth+1);
  });
}

function drawCurve(x1,y1,x2,y2,stroke,w){
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  const cx1=x1+(x2-x1)*0.5,cy1=y1,cx2=x1+(x2-x1)*0.5,cy2=y2;
  path.setAttribute('d',`M${x1} ${y1} C${cx1} ${cy1} ${cx2} ${cy2} ${x2} ${y2}`);
  path.setAttribute('stroke',stroke);
  path.setAttribute('stroke-width',w);
  path.setAttribute('fill','none');
  path.setAttribute('stroke-linecap','round');
  svg.appendChild(path);
}

// ── CHILD PLACEMENT ───────────────────────────────────────────
function calcChildPos(parentNode){
  const children=parentNode.children;
  const n=children.length;
  // Direction from root
  const baseAngle=parentNode.type==='root'?0:Math.atan2(parentNode.y,parentNode.x);
  const dist=parentNode.type==='root'?270:175;
  // Fan out children around the outward direction
  const fanSpread=d2r(Math.min(70,Math.max(25,n*22)));
  const newAngle=baseAngle - fanSpread/2 + (n===0?0:fanSpread);
  return{
    x:parentNode.x+Math.cos(newAngle)*dist,
    y:parentNode.y+Math.sin(newAngle)*dist
  };
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(parentNode){
  editingId=null; selectedParentId=parentNode.id;
  document.getElementById('modalTitle').textContent='ADD NODE';
  document.getElementById('modalCtx').textContent=
    'Child of: '+(parentNode.type==='root'?'VIPRA':parentNode.label);
  document.getElementById('mLabel').value='';
  document.getElementById('mBody').value='';
  setTypeRaw('idea');
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('mLabel').focus(),150);
}

function openModalById(id,e){
  e.stopPropagation();
  const node=findNode(id);if(node)openModal(node);
}

function openEditById(id,e){
  e.stopPropagation();
  const node=findNode(id);if(!node)return;
  editingId=id; selectedParentId=null;
  document.getElementById('modalTitle').textContent='EDIT NODE';
  document.getElementById('modalCtx').textContent='Editing: '+node.label;
  document.getElementById('mLabel').value=node.label;
  document.getElementById('mBody').value=node.body||'';
  setTypeRaw(node.type);
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('mLabel').focus(),150);
}

function doDelete(id,e){
  e.stopPropagation();
  const node=findNode(id);
  if((node?.children||[]).length>0&&!confirm(`Delete "${node.label}" and all its children?`))return;
  deleteNode(id);saveData();render();showToast('Removed','');
}

function closeModal(){document.getElementById('overlay').classList.remove('open');editingId=null;}

function setType(t,el){
  activeType=t;
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  const ph={note:'Write your note...',image:'Paste image URL...',link:'https://...',research:'Research findings...',idea:'Describe the idea...',task:'Task details...'};
  const lb={image:'Image URL',link:'URL'};
  document.getElementById('mBody').placeholder=ph[t]||'Details...';
  document.getElementById('mBodyLbl').textContent=lb[t]||'Notes';
}

function setTypeRaw(t){
  activeType=t;
  document.querySelectorAll('.tp').forEach(p=>p.classList.toggle('active',p.textContent.toLowerCase()===t));
}

function saveNode(){
  const label=document.getElementById('mLabel').value.trim();
  if(!label){showToast('Add a label','');return;}
  const body=document.getElementById('mBody').value.trim();
  if(editingId){
    const node=findNode(editingId);
    if(node){node.label=label;node.body=body;node.type=activeType;}
    saveData();closeModal();render();showToast('Updated','ok');return;
  }
  const parent=findNode(selectedParentId);if(!parent)return;
  const pos=calcChildPos(parent);
  const nn=makeNode(label,activeType,pos.x,pos.y);
  nn.body=body;
  parent.children.push(nn);
  saveData();closeModal();render();showToast('Node added','ok');
}

function exportData(){
  const b=new Blob([JSON.stringify(tree,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='vipra-mindmap.json';a.click();
  showToast('Exported','ok');
}

let tt;
function showToast(msg,cls){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(cls?' '+cls:'');
  clearTimeout(tt);tt=setTimeout(()=>t.className='toast',2500);
}

function eh(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if((e.metaKey||e.ctrlKey)&&e.key==='Enter'&&document.getElementById('overlay').classList.contains('open'))saveNode();});

loadData();resetView();render();
</script>
</body>
</html>
